version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-haber-takip
    restart: unless-stopped
    ports:
      - "3036:3036"
      - "3037:3037"
    environment:
      - PORT=3036
      - DATA_DIR=/app/data
      - NODE_ENV=production
    volumes:
      - haber_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3036/api/stats"]
      interval: 60s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.haber.rule=Host(`haber.erkanerdem.online`)"
      - "traefik.http.routers.haber.entrypoints=websecure"
      - "traefik.http.routers.haber.tls.certresolver=letsencrypt"
      - "traefik.http.services.haber.loadbalancer.server.port=3036"

volumes:
  haber_data:
    driver: local
